obligations:
  - id: ob_s5_1_notice_consent
    section_citation: Section 5(1)
    chapter: Chapter II
    obligation_text: A request for consent must be accompanied by or preceded by a notice containing details of the personal data to be collected, the purpose of processing, how rights can be exercised, and how to file complaints with the Board.
    applicability_conditions:
      role: Data Fiduciary
      consent_required: true
    evidence_checklist:
      - item: Notice lists all categories of personal data to be collected.
        positive_keywords: ["categories", "category", "collected", "list", "types of data"]
        negative_keywords: ["not list", "no category", "missing", "omit"]
      - item: Notice states the specific, explicit purpose for processing.
        positive_keywords: ["purpose", "specific purpose", "reason", "explicit"]
        negative_keywords: ["no purpose", "unclear", "missing"]
      - item: Notice contains clear instructions on how the Data Principal can withdraw consent.
        positive_keywords: ["withdraw", "withdrawal", "revoke"]
        negative_keywords: ["cannot withdraw", "no withdrawal", "missing instructions"]
      - item: Notice details the grievance redressal mechanism and contact details.
        positive_keywords: ["grievance", "redressal", "complaint", "contact"]
        negative_keywords: ["no grievance", "no redressal", "no contact"]
      - item: Notice explains how to lodge a complaint with the Data Protection Board of India.
        positive_keywords: ["board", "dpbi", "lodge", "complain to board"]
        negative_keywords: ["no board", "not explain"]
      - item: Notice is written in clear and plain language.
        positive_keywords: ["clear", "plain", "simple", "readable"]
        negative_keywords: ["unclear", "complex", "difficult"]
      - item: Notice is available in English and options for the 22 languages specified in the Eighth Schedule to the Constitution.
        positive_keywords: ["english", "22 languages", "eighth schedule", "translation"]
        negative_keywords: ["only english", "no language option", "no translation"]
    exemption_refs:
      - Section 17(1)
      - Section 17(2)
    penalty_ref: Section 33, Schedule (Sr No 5)
    version: 1

  - id: ob_s5_2_notice_pre_consent
    section_citation: Section 5(2)
    chapter: Chapter II
    obligation_text: If consent was given prior to the commencement of the Act, a notice containing details of personal data processed and the purpose must be given to the Data Principal as soon as feasible.
    applicability_conditions:
      role: Data Fiduciary
      pre_existing_consent: true
    evidence_checklist:
      - item: Notice has been sent to all pre-existing users as soon as feasible.
        positive_keywords: ["sent", "pre-existing", "existing users", "commencement"]
        negative_keywords: ["not sent", "no notice sent"]
      - item: Notice lists the personal data currently processed and purpose of processing.
        positive_keywords: ["lists data", "processed data", "purpose"]
        negative_keywords: ["no purpose", "not list"]
      - item: Notice details how rights can be exercised (erasure, withdrawal).
        positive_keywords: ["rights", "exercise rights", "erasure", "withdrawal"]
        negative_keywords: ["no rights", "cannot withdraw"]
      - item: Notice details how to complain to the Board.
        positive_keywords: ["complain", "board", "dpbi", "complaint"]
        negative_keywords: ["no board", "not explain"]
    exemption_refs:
      - Section 17(1)
      - Section 17(2)
    penalty_ref: Section 33, Schedule (Sr No 5)
    version: 1

  - id: ob_s6_1_consent_quality
    section_citation: Section 6(1)
    chapter: Chapter II
    obligation_text: Consent must be free, specific, informed, unconditional, and unambiguous, with a clear affirmative action, and limited to what is necessary for the specified purpose.
    applicability_conditions:
      role: Data Fiduciary
      consent_required: true
    evidence_checklist:
      - item: Consent flow is explicit and does not use pre-ticked checkboxes or forced agreements.
        positive_keywords: ["explicit", "checkbox", "affirmative", "not pre-ticked"]
        negative_keywords: ["pre-ticked", "forced", "force", "implicit"]
      - item: Consent is granular for different purposes.
        positive_keywords: ["granular", "separate", "different purposes"]
        negative_keywords: ["bundle", "all-in-one", "not granular"]
      - item: Consent is not a condition for accessing services that do not require such data.
        positive_keywords: ["unconditional", "not a condition", "optional"]
        negative_keywords: ["conditional", "forced", "required to access"]
    exemption_refs:
      - Section 17(1)
      - Section 17(2)
    penalty_ref: Section 33, Schedule (Sr No 5)
    version: 1

  - id: ob_s8_5_security_safeguards
    section_citation: Section 8(5)
    chapter: Chapter II
    obligation_text: Implement reasonable security safeguards to prevent personal data breach, including technical, physical, and administrative controls.
    applicability_conditions:
      role: Data Fiduciary
    evidence_checklist:
      - item: Encryption of personal data at rest and in transit.
        positive_keywords: ["encryption", "encrypt", "ssl", "tls"]
        negative_keywords: ["unencrypted", "plaintext", "no encryption"]
      - item: Access controls, MFA, and least-privilege policies.
        positive_keywords: ["access control", "mfa", "least-privilege", "multi-factor"]
        negative_keywords: ["no access control", "no mfa", "shared password"]
      - item: Regular vulnerability scans and penetration testing.
        positive_keywords: ["scan", "penetration", "pentest", "vulnerability"]
        negative_keywords: ["no testing", "never scanned"]
    exemption_refs: []
    penalty_ref: Section 33, Schedule (Sr No 2)
    version: 1

  - id: ob_s8_6_breach_notification
    section_citation: Section 8(6)
    chapter: Chapter II
    obligation_text: In the event of a personal data breach, the Data Fiduciary must notify the Data Protection Board of India and each affected Data Principal in the prescribed form and manner.
    applicability_conditions:
      role: Data Fiduciary
      has_data_breach: true
    evidence_checklist:
      - item: Incident response plan exists detailing notification steps.
        positive_keywords: ["incident response", "response plan", "procedure"]
        negative_keywords: ["no plan", "no procedure"]
      - item: Templates for notifying the Board and affected users are prepared.
        positive_keywords: ["template", "notification form", "notify board"]
        negative_keywords: ["no template", "no form"]
    exemption_refs:
      - Section 17(1)
      - Section 17(2)
    penalty_ref: Section 33, Schedule (Sr No 1)
    version: 1

  - id: ob_s9_1_child_consent
    section_citation: Section 9(1)
    chapter: Chapter II
    obligation_text: Before processing personal data of a child (under 18) or a person with a disability, obtain verifiable consent of the parent or lawful guardian.
    applicability_conditions:
      role: Data Fiduciary
      processes_children_data: true
    evidence_checklist:
      - item: Age verification check is integrated into user onboarding.
        positive_keywords: ["age verification", "verify age", "birthdate"]
        negative_keywords: ["no age verification", "do not check age"]
      - item: Consent flow triggers parental email/phone verification for users under 18.
        positive_keywords: ["parental consent", "parental email", "guardian", "verification"]
        negative_keywords: ["no parental", "no guardian consent"]
    exemption_refs:
      - Section 17(1)
      - Section 17(2)
    penalty_ref: Section 33, Schedule (Sr No 3)
    version: 1

  - id: ob_s10_2_a_sdf_dpo
    section_citation: Section 10(2)(a)
    chapter: Chapter II
    obligation_text: A Significant Data Fiduciary must appoint a Data Protection Officer (DPO) who is based in India, is of senior rank, and reports to the board of directors.
    applicability_conditions:
      role: Significant Data Fiduciary
    evidence_checklist:
      - item: Senior-level appointment letter for India-based DPO is documented.
        positive_keywords: ["dpo appointed", "data protection officer", "appointment"]
        negative_keywords: ["no dpo", "no data protection officer"]
      - item: DPO contact details are published on primary digital interfaces.
        positive_keywords: ["published", "dpo contact", "dpo email"]
        negative_keywords: ["not published", "hidden"]
    exemption_refs:
      - Section 17(2)
    penalty_ref: Section 33, Schedule (Sr No 5)
    version: 1

  - id: ob_s11_rights_access
    section_citation: Section 11
    chapter: Chapter III
    obligation_text: The Data Principal has the right to obtain confirmation of processing, a summary of processed data, and details of all other Data Fiduciaries/Processors shared with.
    applicability_conditions:
      role: Data Fiduciary
    evidence_checklist:
      - item: User dashboard or SAR (Subject Access Request) mechanism is available.
        positive_keywords: ["dashboard", "sar", "subject access", "request data"]
        negative_keywords: ["no dashboard", "no request mechanism"]
      - item: Summary report covers all categories of personal data processed.
        positive_keywords: ["summary report", "categories of data", "data details"]
        negative_keywords: ["no summary", "incomplete details"]
    exemption_refs:
      - Section 17(1)
      - Section 17(2)
    penalty_ref: Section 33, Schedule (Sr No 5)
    version: 1

  - id: ob_s16_cross_border_transfer
    section_citation: Section 16
    chapter: Chapter II
    obligation_text: The transfer of personal data outside India must comply with restriction lists notified by the Central Government.
    applicability_conditions:
      role: Data Fiduciary
      transfers_data_outside_india: true
    evidence_checklist:
      - item: Localization or mapping showing no data routed to restricted territories.
        positive_keywords: ["mapping", "map", "localization", "data map", "restricted territories"]
        negative_keywords: ["no mapping", "no localization"]
    exemption_refs:
      - Section 17(1)
      - Section 17(2)
    penalty_ref: Section 33, Schedule (Sr No 5)
    version: 1
