name: Self-Hosted App Runner

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: app-runner-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-app:
    name: Build And Host App
    runs-on: [self-hosted]

    env:
      PYTHONPATH: backend
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: "8000"
      FRONTEND_HOST: 0.0.0.0
      FRONTEND_PORT: "4173"
      VAULT_ADDR: http://localhost:8200
      REDIS_HOST: localhost
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Stop previous app processes on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path .runner | Out-Null

          foreach ($name in "backend", "frontend") {
            $pidFile = ".runner/$name.pid"
            if (Test-Path $pidFile) {
              $pid = Get-Content $pidFile | Select-Object -First 1
              if ($pid) {
                Stop-Process -Id $pid -Force -ErrorAction SilentlyContinue
              }
              Remove-Item $pidFile -Force -ErrorAction SilentlyContinue
            }
          }

      - name: Stop previous app processes on Linux or macOS
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p .runner
          for name in backend frontend; do
            pid_file=".runner/${name}.pid"
            if [ -f "$pid_file" ]; then
              pid="$(cat "$pid_file")"
              kill "$pid" 2>/dev/null || true
              rm -f "$pid_file"
            fi
          done

      - name: Start app services on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $backendLog = (Resolve-Path ".").Path + "\.runner\backend.log"
          $frontendLog = (Resolve-Path ".").Path + "\.runner\frontend.log"

          $backend = Start-Process `
            -FilePath python `
            -ArgumentList "-m", "uvicorn", "app.main:app", "--host", $env:BACKEND_HOST, "--port", $env:BACKEND_PORT `
            -WorkingDirectory (Join-Path (Resolve-Path ".").Path "backend") `
            -RedirectStandardOutput $backendLog `
            -RedirectStandardError $backendLog `
            -PassThru

          $frontend = Start-Process `
            -FilePath npm.cmd `
            -ArgumentList "run", "preview", "--", "--host", $env:FRONTEND_HOST, "--port", $env:FRONTEND_PORT `
            -WorkingDirectory (Join-Path (Resolve-Path ".").Path "frontend") `
            -RedirectStandardOutput $frontendLog `
            -RedirectStandardError $frontendLog `
            -PassThru

          $backend.Id | Set-Content ".runner/backend.pid"
          $frontend.Id | Set-Content ".runner/frontend.pid"

      - name: Start app services on Linux or macOS
        if: runner.os != 'Windows'
        shell: bash
        run: |
          nohup bash -lc 'cd backend && python -m uvicorn app.main:app --host "$BACKEND_HOST" --port "$BACKEND_PORT"' \
            > .runner/backend.log 2>&1 &
          echo $! > .runner/backend.pid

          nohup bash -lc 'cd frontend && npm run preview -- --host "$FRONTEND_HOST" --port "$FRONTEND_PORT"' \
            > .runner/frontend.log 2>&1 &
          echo $! > .runner/frontend.pid

      - name: Wait for backend health
        shell: bash
        run: |
          python - <<'PY'
          import sys
          import time
          from urllib.request import urlopen

          url = "http://127.0.0.1:8000/api/v1/health"
          for _ in range(30):
              try:
                  with urlopen(url, timeout=5) as response:
                      if response.status < 500:
                          sys.exit(0)
              except Exception:
                  time.sleep(2)
          raise SystemExit("Backend did not become healthy in time.")
          PY

      - name: Print service endpoints
        shell: bash
        run: |
          echo "Backend is available at http://127.0.0.1:${BACKEND_PORT}"
          echo "Frontend is available at http://127.0.0.1:${FRONTEND_PORT}"
